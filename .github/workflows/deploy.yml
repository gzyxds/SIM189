name: 定时部署

on:
  schedule:
    # 每3天执行一次，北京时间凌晨2:00（UTC 18:00）
    # GitHub Actions cron 日期字段不支持 / 语法，因此枚举每月每隔3天的日期
    - cron: "0 18 1,4,7,10,13,16,19,22,25,28,31 * *"
  workflow_dispatch:       # 也支持手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 触发 EdgeOne 部署钩子
        run: |
          curl -fsS -X POST "https://pages-api.cloud.tencent.com/v1/webhook/07f6dbd000a5f0a65b433994a151551022b39f1dcb8fcb0080c42979c74fc103"